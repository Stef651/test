<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roomflow · Investment Advisory</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:       #0c0d10;
  --s1:       #13151a;
  --s2:       #191c23;
  --b1:       #21262f;
  --b2:       #2d3340;
  --text:     #e3e0d9;
  --muted:    #78808f;
  --dim:      #454d5a;
  --gold:     #c8a04e;
  --gold-bg:  rgba(200,160,78,.08);
  --gold-b:   rgba(200,160,78,.25);
  --green:    #6aab7a;
  --green-bg: rgba(106,171,122,.08);
  --green-b:  rgba(106,171,122,.25);
  --red:      #d96f58;
  --red-bg:   rgba(217,111,88,.08);
  --red-b:    rgba(217,111,88,.25);
  --blue:     #6b84c4;
  --blue-bg:  rgba(107,132,196,.08);
  --blue-b:   rgba(107,132,196,.25);
  --teal:     #4a9898;
  --lila:     #9478ac;
  --serif:    Georgia,'Times New Roman',serif;
  --sans:     'Inter',system-ui,Arial,sans-serif;
  --mono:     'SF Mono','Fira Code',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
button{cursor:pointer;font-family:inherit;border:none;outline:none}

/* LOCK */
#lock{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:28px}
.lock-wordmark{font-family:var(--serif);font-size:20px;letter-spacing:.5px;color:var(--text)}
.lock-wordmark em{color:var(--gold);font-style:normal}
.lock-box{width:320px;background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:32px 28px;text-align:center}
.lock-icon{font-size:32px;margin-bottom:14px;opacity:.5}
.lock-h{font-family:var(--serif);font-size:17px;margin-bottom:5px}
.lock-p{font-size:11.5px;color:var(--muted);margin-bottom:22px;line-height:1.55}
.lock-input{width:100%;background:var(--bg);border:1px solid var(--b2);color:var(--text);border-radius:6px;padding:10px 13px;font-size:13px;font-family:var(--mono);letter-spacing:2px;margin-bottom:10px;transition:border-color .2s}
.lock-input:focus{border-color:var(--gold);outline:none}
.lock-btn{width:100%;background:var(--gold);color:#0c0d10;border-radius:6px;padding:10px;font-size:12px;font-weight:700;letter-spacing:1px;transition:opacity .2s}
.lock-btn:hover{opacity:.82}
.lock-err{font-size:11px;color:var(--red);margin-top:8px;min-height:15px}
.lock-foot{font-size:10px;color:var(--dim);text-align:center;max-width:240px;line-height:1.6}

/* APP */
#app{display:none}
#app.on{display:block}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:rgba(12,13,16,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--b1);height:54px;padding:0 28px;display:flex;align-items:center;justify-content:space-between}
.wordmark{font-family:var(--serif);font-size:16px}
.wordmark em{color:var(--gold);font-style:normal}
.topbar-r{display:flex;align-items:center;gap:14px}
.topbar-meta{font-size:11px;color:var(--muted)}
.chip{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;border:1px solid;letter-spacing:.4px}
.chip-gold{color:var(--gold);border-color:var(--gold-b);background:var(--gold-bg)}
.chip-green{color:var(--green);border-color:var(--green-b);background:var(--green-bg)}
.chip-red{color:var(--red);border-color:var(--red-b);background:var(--red-bg)}
.chip-blue{color:var(--blue);border-color:var(--blue-b);background:var(--blue-bg)}

/* LAYOUT */
.wrap{max-width:1300px;margin:0 auto;padding:32px 28px 72px}

/* HERO */
.hero{background:radial-gradient(130% 160% at 85% -15%,#1a2030 0%,#111419 55%,#0d1014 100%);border:1px solid var(--b2);border-radius:12px;padding:26px 30px 22px;margin-bottom:22px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;top:-80px;right:-80px;width:260px;height:260px;background:radial-gradient(circle,rgba(200,160,78,.1) 0%,transparent 68%);pointer-events:none}
.eyebrow{font-size:9.5px;letter-spacing:3px;color:var(--gold);font-weight:700;text-transform:uppercase;margin-bottom:9px}
.hero-title{font-family:var(--serif);font-size:32px;color:#f2efe8;line-height:1.05;margin-bottom:5px}
.hero-sub{font-size:12.5px;color:var(--muted);margin-bottom:16px;line-height:1.6}
.chips-row{display:flex;flex-wrap:wrap;gap:7px}

/* SECTION DIVIDER */
.sec{font-size:9.5px;letter-spacing:2.5px;color:var(--dim);text-transform:uppercase;font-weight:600;margin:28px 0 12px;display:flex;align-items:center;gap:10px}
.sec::after{content:'';flex:1;height:1px;background:var(--b1)}

/* KPI STRIP */
.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:9px;margin-bottom:18px}
.kpi{background:var(--s1);border:1px solid var(--b1);border-radius:9px;padding:14px 15px 12px}
.kpi-lab{font-size:9px;letter-spacing:1.2px;color:var(--muted);text-transform:uppercase;margin-bottom:7px}
.kpi-val{font-size:21px;font-weight:700;line-height:1;margin-bottom:4px}
.kpi-sub{font-size:10px;color:var(--muted);line-height:1.4}
.c-green{color:var(--green)} .c-gold{color:var(--gold)} .c-red{color:var(--red)} .c-blue{color:var(--blue)} .c-text{color:var(--text)}

/* CARDS */
.grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:12px;margin-bottom:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.grid-eq{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:9px;padding:18px 20px}
.card-title{font-family:var(--serif);font-size:14.5px;color:#eeebe3;margin-bottom:2px}
.card-sub{font-size:10.5px;color:var(--muted);margin-bottom:14px}

/* BAR ROWS */
.bar-row{display:flex;align-items:center;margin-bottom:11px}
.bar-lbl{width:175px;flex-shrink:0}
.bar-lbl-main{font-size:11px;color:var(--text)}
.bar-lbl-sub{font-size:9.5px;color:var(--muted);display:block;margin-top:1px}
.bar-track{flex:1;height:13px;background:#0a0c0f;border-radius:3px;margin:0 11px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;width:0;transition:width 1.1s cubic-bezier(.4,0,.2,1)}
.bar-val{width:95px;text-align:right;font-size:11px;font-weight:700}

/* DONUT */
.donut-wrap{display:flex;align-items:center;gap:18px}
.donut-rel{position:relative;width:155px;height:155px;flex-shrink:0;border-radius:50%}
.donut-fallback{position:absolute;inset:0;border-radius:50%;background:conic-gradient(var(--cg-stops))}
.donut-fallback::after{content:'';position:absolute;inset:0;margin:auto;width:68%;height:68%;top:16%;left:16%;background:var(--s1);border-radius:50%}
.bar-fallback{height:100%;border-radius:3px;display:flex}
.bar-fallback span{height:100%;display:block}
.donut-ctr{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.donut-num{font-family:var(--serif);font-size:19px;color:#f0ede6;line-height:1}
.donut-unit{font-size:9px;color:var(--muted);margin-top:2px}
.leg{display:flex;align-items:center;margin-bottom:7px;font-size:11px}
.leg-dot{width:8px;height:8px;border-radius:2px;margin-right:8px;flex-shrink:0}
.leg-name{flex:1;color:var(--text)}
.leg-val{color:var(--muted);font-size:10px}

/* RISK */
.risk{display:flex;margin-bottom:9px}
.risk-bar{width:4px;border-radius:3px;margin-right:11px;flex-shrink:0;align-self:stretch;min-height:28px}
.risk-t{font-size:11.5px;color:var(--text);font-weight:600;margin-bottom:2px}
.risk-d{font-size:10.5px;color:var(--muted);line-height:1.4}
.risk-red .risk-bar{background:var(--red)}
.risk-orange .risk-bar{background:var(--gold)}
.risk-green .risk-bar{background:var(--green)}

/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:8.5px;letter-spacing:1.2px;color:var(--muted);text-transform:uppercase;text-align:left;padding:5px 9px;border-bottom:1px solid var(--b2);font-weight:600}
.tbl td{font-size:11px;color:var(--text);padding:6px 9px;border-bottom:1px solid var(--b1);vertical-align:top;line-height:1.4}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.015)}
.td-nr{color:var(--gold);font-weight:700;font-family:var(--mono);font-size:9.5px;white-space:nowrap}
.td-dim{color:var(--muted);font-size:10px}
.pill{display:inline-block;font-size:9px;padding:2px 8px;border:1px solid;border-radius:10px;font-weight:600;white-space:nowrap}
.pill-ok{color:var(--green);border-color:var(--green-b)}
.pill-err{color:var(--red);border-color:var(--red-b)}
.pill-warn{color:var(--gold);border-color:var(--gold-b)}

/* ECKDATEN */
.eck{width:100%;border-collapse:collapse}
.eck td{padding:5px 0;border-bottom:1px solid var(--b1);font-size:11px}
.eck tr:last-child td{border-bottom:none}
.eck-k{color:var(--muted);width:42%}
.eck-v{color:var(--text)}

/* NOTE */
.note{background:#110e09;border:1px solid #3a2a18;border-left:3px solid var(--gold);border-radius:5px;padding:11px 14px;font-size:11px;color:#d4c9b4;line-height:1.6;margin-top:12px}

/* PROGRESS */
.prog-wrap{display:flex;align-items:center;gap:10px;margin-bottom:13px}
.prog-track{flex:1;height:7px;background:#0a0c0f;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:var(--green);border-radius:4px;transition:width 1s ease}
.prog-label{font-size:10.5px;color:var(--muted);white-space:nowrap}

/* SCORE GAUGES */
.scores{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.score-item{background:var(--s2);border:1px solid var(--b1);border-radius:9px;padding:14px 10px;text-align:center}
.score-val{font-size:28px;font-weight:700;font-family:var(--serif);line-height:1}
.score-lab{font-size:9.5px;color:var(--muted);margin-top:5px;letter-spacing:.3px}

/* NEXT STEPS */
.steps{counter-reset:step}
.step{display:flex;gap:13px;margin-bottom:11px;align-items:flex-start}
.step-n{width:22px;height:22px;border-radius:50%;background:var(--gold-bg);border:1px solid var(--gold-b);color:var(--gold);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-t{font-size:11.5px;color:var(--text);font-weight:600;margin-bottom:2px}
.step-d{font-size:10.5px;color:var(--muted);line-height:1.4}

/* CONCEPT BLOCKS (Architektur / Mobilität / Lage – aus Mappe Text) */
.concept-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.concept{background:var(--s2);border:1px solid var(--b1);border-radius:9px;padding:15px 16px}
.concept-icon{font-size:18px;margin-bottom:8px;display:block}
.concept-h{font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px;font-family:var(--serif)}
.concept-p{font-size:10.5px;color:var(--muted);line-height:1.6;margin-bottom:8px}
.concept-p:last-child{margin-bottom:0}
.concept-p b{color:var(--text);font-weight:600}

/* SOURCE TAG */
.src-tag{display:inline-block;font-size:8.5px;letter-spacing:1px;color:var(--dim);text-transform:uppercase;border:1px solid var(--b1);border-radius:3px;padding:1px 6px;margin-left:8px;vertical-align:middle;font-weight:600}

/* GALLERY (Renderings/Grundrisse) */
.gallery{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.gallery-item{position:relative;border-radius:7px;overflow:hidden;border:1px solid var(--b1);aspect-ratio:4/3;background:var(--s2)}
.gallery-item img{width:100%;height:100%;object-fit:cover;display:block}
.gallery-cap{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.75));color:#fff;font-size:9.5px;padding:14px 8px 6px;letter-spacing:.3px}

/* LAGE INFO LIST */
.lage-list{display:flex;flex-direction:column;gap:9px}
.lage-row{display:flex;gap:10px;align-items:flex-start}
.lage-ico{width:26px;height:26px;border-radius:6px;background:var(--gold-bg);border:1px solid var(--gold-b);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.lage-t{font-size:11px;color:var(--text);font-weight:600}
.lage-d{font-size:10px;color:var(--muted);line-height:1.4}

/* FOOTER */
.footer{border-top:1px solid var(--b1);padding-top:18px;margin-top:44px;display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--dim)}
.conf{font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;text-align:center;margin-top:7px}

/* ANIM */
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .45s ease forwards}
.fi2{animation:fi .45s .08s ease both}
.fi3{animation:fi .45s .16s ease both}
.fi4{animation:fi .45s .24s ease both}

/* RESPONSIVE */
@media(max-width:1080px){.kpi-row{grid-template-columns:repeat(3,1fr)}}
@media(max-width:780px){
  .grid-2,.grid-3,.grid-eq{grid-template-columns:1fr}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .scores{grid-template-columns:repeat(2,1fr)}
  .wrap{padding:18px 14px 48px}
  .topbar{padding:0 14px}
}
</style>
</head>
<body>

<!-- ░░ LOCK ░░ -->
<div id="lock">
  <div class="lock-wordmark">Room<em>flow</em> · Investment Advisory</div>
  <div class="lock-box">
    <div class="lock-icon">🔐</div>

    <button class="lock-btn" onclick="unlock()">Öffnen →</button>

let P = null;

function urlToken(){ return new URLSearchParams(location.search).get('token') || new URLSearchParams(location.search).get('t'); }

function unlock(){
  const v = document.getElementById('pw').value.trim();
  const t = urlToken() || v;
  P = PROJEKTE.find(x => x.token === t);
  if(P){
    document.getElementById('lock').style.display='none';
    document.getElementById('app').classList.add('on');
    render(P);
  } else {
    document.getElementById('err').textContent = 'Ungültiger Zugangscode.';
  }
}
document.getElementById('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') unlock(); document.getElementById('err').textContent=''; });
window.addEventListener('DOMContentLoaded', ()=>{ const t=urlToken(); if(t){ document.getElementById('pw').value=t; unlock(); }});

// ── Conic-gradient fallback for donut (used if Chart.js fails to load) ──
function donutGradient(items){
  let acc = 0;
  const stops = items.map(a=>{
    const start = acc; acc += a.pct;
    return `${a.color} ${start}% ${acc}%`;
  });
  return stops.join(',');
}

// ── Docs progress bar ────────────────────────────────────────
function docsProgress(docs){
  const ok = docs.filter(d=>d.status==='ok').length;
  const t  = docs.length;
  const pct = Math.round(ok/t*100);
  return `<div class="prog-wrap"><div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div><span class="prog-label">${ok} / ${t} Dokumente (${pct}%)</span></div>`;
}

// ── Donut chart ───────────────────────────────────────────────
function initDonut(p){
  const el = document.getElementById('donut');
  if(!el) return;
  if(typeof Chart === 'undefined'){ el.style.display='none'; return; }
  el.style.background = 'transparent';
  new Chart(el,{
    type:'doughnut',
    data:{
      labels: p.flaechen.items.map(a=>a.name),
      datasets:[{ data:p.flaechen.items.map(a=>a.m2), backgroundColor:p.flaechen.items.map(a=>a.color), borderColor:'#13151a', borderWidth:2, hoverOffset:4 }]
    },
    options:{ cutout:'68%', plugins:{ legend:{display:false}, tooltip:{ callbacks:{label:c=>` ${c.label}: ${c.raw.toLocaleString('de-DE')} m²`} } }, animation:{duration:900} }
  });
  // Chart.js succeeded — hide the CSS conic-gradient fallback behind it
  const fb = el.previousElementSibling;
  if(fb && fb.classList.contains('donut-fallback')) fb.style.display='none';
}

// ── Bar chart (Baukostenaufschlüsselung) ──────────────────────
function initBar(p){
  const el = document.getElementById('barChart');
  if(!el) return;
  if(typeof Chart === 'undefined'){
    el.style.display='none';
    const fb = document.getElementById('barFallback');
    if(fb) fb.style.display='block';
    return;
  }
  const labels = p.baukosten_detail.map(b=>b.pos);
  const vals   = p.baukosten_detail.map(b=>b.wert);
  const colors = ['#c8a04e','#c8a04e','#c8a04e','#c8a04e','#6b84c4','#d96f58','#d96f58','#d96f58','#d96f58'];
  new Chart(el,{
    type:'bar',
    data:{
      labels,
      datasets:[{ data:vals, backgroundColor:colors.map(c=>c+'bb'), borderColor:colors, borderWidth:1, borderRadius:3 }]
    },
    options:{
      indexAxis:'y', responsive:true, maintainAspectRatio:true,
      plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>` ${c.raw.toFixed(2)} Mio. €`}} },
      scales:{
        x:{ ticks:{color:'#78808f',font:{size:9},callback:v=>v+' Mio.'}, grid:{color:'#1c2028'} },
        y:{ ticks:{color:'#78808f',font:{size:9}}, grid:{color:'#1c2028'} }
      },
      animation:{duration:900}
    }
  });
}

// ── Animate bar fills ─────────────────────────────────────────
function animBars(){
  document.querySelectorAll('.bar-fill[data-w]').forEach(el=>{
    const w = el.dataset.w;
    setTimeout(()=> el.style.width = w+'%', 120);
  });
}
